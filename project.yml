name: Chorin
options:
  bundleIdPrefix: com.chorin
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  Chorin:
    type: application
    platform: iOS
    sources:
      - path: Chorin
        excludes:
          - ".old/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chorin.app
        SWIFT_VERSION: 5.0
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    dependencies:
      - package: Supabase
        product: Supabase
